name: Update Google Scholar citation counts

on:
  workflow_dispatch:
  schedule:
    # Once per week: Monday 00:00 UTC
    - cron: "0 0 * * 1"

permissions:
  contents: write

jobs:
  update-citations:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update citation counts
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SCHOLAR_AUTHOR_ID: sHQFKFUAAAAJ
        run: |
          python bin/update_citations.py

      - name: Commit citation data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/citations.json
          git diff --cached --quiet || git commit -m "Update Google Scholar citation counts"
          git push